<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Workout Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<style>
/* Фиксы для iPhone */
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #0f0f0f;
  color: #fff;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

input, button, .tab, .save {
  font-size: 16px; /* предотвращает зум на iPhone */
}

input[type="tel"] {
  width: 70px;
  padding: 5px;
  border-radius: 6px;
  font-size: 16px;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: #151515;
}

.tabs {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #1a1a1a;
}

.tab {
  padding: 8px 14px;
  border-radius: 20px;
  background: #2a2a2a;
  cursor: pointer;
}

.tab.active { background: #4caf50; }

.card {
  background: #1b1b1b;
  margin: 10px;
  padding: 12px;
  border-radius: 12px;
}

.title { font-weight: bold; }
.small { color: #aaa; font-size: 12px; }

.row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin: 6px 0;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.save {
  width: calc(100% - 20px);
  margin: 10px;
  background: #4caf50;
  color: white;
}

.timer {
  margin: 10px;
  padding: 12px;
  background: #1b1b1b;
  border-radius: 12px;
}
</style>
</head>

<body>

<header>🏋️ Workout Tracker</header>

<div class="tabs">
  <div class="tab active" onclick="selectDay('push', this)">Толкай</div>
  <div class="tab" onclick="selectDay('pull', this)">Тяни</div>
  <div class="tab" onclick="selectDay('legs', this)">Ноги</div>
</div>

<div id="app"></div>

<button class="save" onclick="saveWorkout()">💾 Сохранить</button>

<script>
const program = {
  push: [
    {name:"Жим гантелей", reps:"8-12"},
    {name:"Разводка", reps:"12-15"},
    {name:"Жим над головой", reps:"10-15"},
    {name:"Вращение блина", reps:"10-12"},
    {name:"Французский жим", reps:"12-15"}
  ],
  pull: [
    {name:"Тяга гантели", reps:"10-15"},
    {name:"Доброе утро", reps:"12-15"},
    {name:"Пуловер", reps:"12-15"},
    {name:"Бицепс", reps:"12-15"},
    {name:"Диагональные подъёмы", reps:"12-15"}
  ],
  legs: [
    {name:"Присед", reps:"10-15"},
    {name:"Румынская тяга", reps:"12-15"},
    {name:"Выпады", reps:"10-12"},
    {name:"Махи гирей", reps:"15-20"},
    {name:"Джеб", reps:"12-15"}
  ]
};

let currentDay = "push";

function getData(){
  return JSON.parse(localStorage.getItem("workouts") || "[]");
}

function getLast(day, name){
  const all = getData().filter(w => w.day === day).reverse();
  for(let w of all){
    const ex = w.exercises.find(e => e.name === name);
    if(ex) return ex;
  }
  return null;
}

function selectDay(day, el){
  currentDay = day;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  const app = document.getElementById("app");
  app.innerHTML = "";

  program[day].forEach(ex => {
    const last = getLast(day, ex.name);
    let prev = last ? `${last.weight || "-"} кг × ${last.sets.filter(s => s.done).length}` : "нет данных";

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.name = ex.name;

    card.innerHTML = `
      <div class="title">${ex.name} (${ex.reps})</div>
      <div class="small">⏮ ${prev}</div>
      <div class="row">
        <span>Вес:</span>
        <input type="tel" inputmode="numeric" pattern="\\d*" class="weight">
      </div>
      <div class="row">
        <label><input type="checkbox">1</label>
        <label><input type="checkbox">2</label>
        <label><input type="checkbox">3</label>
      </div>
    `;
    app.appendChild(card);
  });
  renderTimer();
}

function saveWorkout(){
  const cards = document.querySelectorAll(".card");
  const exercises = [];

  cards.forEach(c=>{
    const name = c.dataset.name;
    const weight = c.querySelector(".weight").value;
    const sets = [];
    c.querySelectorAll("input[type=checkbox]").forEach(cb=>{
      sets.push({done:cb.checked});
    });
    if(weight || sets.some(s=>s.done)){
      exercises.push({name, weight, sets});
    }
  });

  const data = getData();
  data.push({
    id:Date.now(),
    date:new Date().toISOString(),
    day:currentDay,
    exercises
  });
  localStorage.setItem("workouts", JSON.stringify(data));
  alert("Сохранено 💪");
}

// Таймер с тремя сигналами
let timer;
let timeLeft = 60;

function playThreeBeeps() {
  const beepSound = "https://actions.google.com/sounds/v1/alarms/beep_short.ogg";
  let audio1 = new Audio(beepSound);
  audio1.play().catch(e => console.log("Сигнал 1:", e));
  setTimeout(() => {
    let audio2 = new Audio(beepSound);
    audio2.play().catch(e => console.log("Сигнал 2:", e));
  }, 400);
  setTimeout(() => {
    let audio3 = new Audio(beepSound);
    audio3.play().catch(e => console.log("Сигнал 3:", e));
  }, 800);
}

function renderTimer(){
  const app = document.getElementById("app");
  const div = document.createElement("div");
  div.className = "timer";
  div.innerHTML = `
    <b>⏱ Таймер отдыха</b>
    <div class="row">
      <input id="t" type="tel" inputmode="numeric" pattern="\\d*" value="60">
      <button onclick="start()">Старт</button>
      <button onclick="stop()">Стоп</button>
    </div>
    <div id="d">не запущен</div>
  `;
  app.appendChild(div);
}

function start(){
  timeLeft = +document.getElementById("t").value;
  const d = document.getElementById("d");
  clearInterval(timer);
  timer = setInterval(()=>{
    d.innerText = `⏳ ${timeLeft} сек`;
    if(timeLeft <= 0){
      clearInterval(timer);
      d.innerText = "⏰ отдых окончен!";
      playThreeBeeps();
      return;
    }
    timeLeft--;
  }, 1000);
}

function stop(){
  clearInterval(timer);
  document.getElementById("d").innerText = "остановлен";
}

selectDay("push");
</script>

<!-- Фикс масштаба для iPhone -->
<script>
(function fixIPhoneScale() {
  let timeout;
  window.addEventListener('focusout', function() {
    timeout = setTimeout(function() {
      window.scrollTo(0, 0);
      document.body.scrollTop = 0;
      document.documentElement.scrollTop = 0;
    }, 100);
  });
  window.addEventListener('resize', function() {
    if (timeout) clearTimeout(timeout);
    timeout = setTimeout(function() {
      window.scrollTo(0, 0);
    }, 100);
  });
})();
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
