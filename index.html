<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #0f0f0f;
  color: #fff;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: #151515;
}

.tabs {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #1a1a1a;
}

.tab {
  padding: 8px 14px;
  border-radius: 20px;
  background: #2a2a2a;
  cursor: pointer;
}

.tab.active { background: #4caf50; }

.card {
  background: #1b1b1b;
  margin: 10px;
  padding: 12px;
  border-radius: 12px;
}

.card.completed {
  background: #2a5a2a;
  border: 1px solid #4caf50;
}

.title { font-weight: bold; }
.small { color: #aaa; font-size: 12px; }

.row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 6px 0;
}

/* ✔ FIX input веса */
.weight {
  width: 60px;
  padding: 4px;
  border-radius: 6px;
  border: none;
  text-align: center;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.save {
  width: calc(100% - 20px);
  margin: 10px;
  background: #4caf50;
  color: white;
}

/* TIMER */
.timer {
  margin: 10px;
  padding: 12px;
  background: #1b1b1b;
  border-radius: 12px;
}

.timer-buttons {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}

.timer-btn.plus {
  background: #2196f3;
  color: white;
}
</style>
</head>

<body>

<header>🏋️ Workout Tracker</header>

<div class="tabs">
  <div class="tab active" onclick="selectDay('push',this)">Толкай</div>
  <div class="tab" onclick="selectDay('pull',this)">Тяни</div>
  <div class="tab" onclick="selectDay('legs',this)">Ноги</div>
</div>

<div id="app"></div>

<button class="save" onclick="saveWorkout()">💾 Сохранить</button>

<script>

const program = {
  push: [
    {name:"Жим гантелей", reps:"8-12"},
    {name:"Разводка", reps:"12-15"},
    {name:"Жим над головой", reps:"10-15"},
    {name:"Французский жим", reps:"12-15"},
    {name:"Отжимания", reps:"макс"}
  ],
  pull: [
    {name:"Тяга гантели", reps:"10-15"},
    {name:"Бицепс", reps:"12-15"},
    {name:"Пуловер", reps:"12-15"},
    {name:"Доброе утро", reps:"12-15"},
    {name:"Подъёмы в наклоне", reps:"12-15"}
  ],
  legs: [
    {name:"Присед", reps:"10-15"},
    {name:"Румынская тяга", reps:"12-15"},
    {name:"Выпады", reps:"10-12"},
    {name:"Махи гирей", reps:"15-20"},
    {name:"Джамп сквоты", reps:"12-15"}
  ]
};

let currentDay="push";
let timer;
let target=0;
let running=false;

/* ================= TIMER ================= */

function start(){
  let sec=parseInt(document.getElementById("t").value)||60;
  target=Date.now()+sec*1000;
  running=true;

  clearInterval(timer);

  timer=setInterval(()=>{
    let left=Math.ceil((target-Date.now())/1000);

    if(left<=0){
      stop(true);
      return;
    }

    document.getElementById("d").innerText="⏳ "+left+" сек";
  },200);
}

function stop(done=false){
  clearInterval(timer);
  running=false;

  if(done){
    notify();
    document.getElementById("d").innerText="готово";
  } else {
    document.getElementById("d").innerText="стоп";
  }
}

/* +30 sec FIX */
function add30(){
  if(running){
    target+=30000;
  }
}

/* ================= UI ================= */

function selectDay(day,el){
  currentDay=day;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  const app=document.getElementById("app");
  app.innerHTML="";

  program[day].forEach((ex,i)=>{

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="title">${i+1}. ${ex.name} (${ex.reps})</div>

      <div class="row">
        <input class="weight" placeholder="кг">
      </div>

      <div class="row">
        <label><input type="checkbox">1</label>
        <label><input type="checkbox">2</label>
        <label><input type="checkbox">3</label>
      </div>
    `;

    app.appendChild(card);

    card.querySelectorAll("input[type=checkbox]").forEach(cb=>{
      cb.onchange=()=>{
        const all=[...card.querySelectorAll("input[type=checkbox]")].every(c=>c.checked);
        card.classList.toggle("completed",all);
      };
    });
  });

  renderTimer();
}

/* ================= TIMER UI ================= */

function renderTimer(){
  const old=document.querySelector(".timer");
  if(old) old.remove();

  const div=document.createElement("div");
  div.className="timer";

  div.innerHTML=`
    <b>⏱ Таймер</b>

    <div class="row">
      <input id="t" value="60">
      <button onclick="start()">Старт</button>
      <button onclick="stop()">Стоп</button>
    </div>

    <div class="timer-buttons">
      <button class="timer-btn plus" onclick="add30()">+30 сек</button>
    </div>

    <div id="d">не запущен</div>
  `;

  document.getElementById("app").appendChild(div);
}

/* ================= NOTIFY ================= */

function notify(){
  const msg="Отдых окончен 💪";

  if(!document.hidden){
    console.log("BEEP");
  } else {
    if("Notification" in window){
      new Notification(msg);
    }
  }
}

/* ================= INIT ================= */

selectDay("push");

</script>

</body>
</html>
