<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #0f0f0f;
  color: #fff;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: #151515;
}

.tabs {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #1a1a1a;
}

.tab {
  padding: 8px 14px;
  border-radius: 20px;
  background: #2a2a2a;
  cursor: pointer;
}

.tab.active { background: #4caf50; }

.card {
  background: #1b1b1b;
  margin: 10px;
  padding: 12px;
  border-radius: 12px;
}

.card.completed {
  background: #2a5a2a;
}

.title { font-weight: bold; }
.small { color: #aaa; font-size: 12px; }

.row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin: 6px 0;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.save {
  width: calc(100% - 20px);
  margin: 10px;
  background: #4caf50;
  color: white;
}

.timer {
  margin: 10px;
  padding: 12px;
  background: #1b1b1b;
  border-radius: 12px;
}

.timer-buttons {
  display: flex;
  gap: 10px;
}

.timer-btn.plus {
  background: #2196f3;
  color: white;
}

.switch-container {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.switch input { display:none; }

.slider {
  width: 48px;
  height: 24px;
  background: #555;
  border-radius: 20px;
  display: inline-block;
  position: relative;
}

.slider:before {
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  top:3px;
  left:3px;
  background:white;
  border-radius:50%;
  transition:0.3s;
}

input:checked + .slider {
  background:#4caf50;
}

input:checked + .slider:before {
  transform: translateX(24px);
}
</style>
</head>

<body>

<header>🏋️ Workout Tracker</header>

<div class="tabs">
  <div class="tab active" onclick="selectDay('push', this)">Толкай</div>
  <div class="tab" onclick="selectDay('pull', this)">Тяни</div>
  <div class="tab" onclick="selectDay('legs', this)">Ноги</div>
</div>

<div id="app"></div>

<button class="save" onclick="saveWorkout()">💾 Сохранить</button>

<script>
const program = {
  push: [
    {name:"Жим гантелей", reps:"8-12"},
    {name:"Разводка", reps:"12-15"},
    {name:"Жим над головой", reps:"10-15"},
    {name:"Французский жим", reps:"12-15"}
  ],
  pull: [
    {name:"Тяга гантели", reps:"10-15"},
    {name:"Бицепс", reps:"12-15"}
  ],
  legs: [
    {name:"Присед", reps:"10-15"},
    {name:"Румынская тяга", reps:"12-15"}
  ]
};

let currentDay = "push";

let audioCtx = null;
let timer = null;
let targetTimestamp = null;
let isRunning = false;

let notificationsEnabled = localStorage.getItem("notif") === "true";

function primeAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}

document.addEventListener("click", primeAudio, { once: true });

function beep(freq, delay, vol) {
  setTimeout(() => {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;
    gain.gain.value = vol;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
  }, delay);
}

function playSound() {
  if (document.hidden) return;
  beep(880, 0, 0.2);
  beep(880, 300, 0.4);
  beep(880, 600, 0.8);
}

function askNotif() {
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
  }
}

function notify() {
  if (!notificationsEnabled) return;

  if ("Notification" in window && Notification.permission === "granted") {
    new Notification("⏰ Отдых окончен", {
      body: "Пора делать следующий подход 💪",
      icon: "icon.png"
    });
  }
}

function selectDay(day, el) {
  currentDay = day;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (el) el.classList.add("active");

  const app = document.getElementById("app");
  app.innerHTML = "";

  program[day].forEach(ex => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${ex.name}</div>
      <div class="small">${ex.reps}</div>

      <div class="row">
        <input placeholder="Вес">
        <label><input type="checkbox">1</label>
        <label><input type="checkbox">2</label>
        <label><input type="checkbox">3</label>
      </div>
    `;

    app.appendChild(div);
  });

  renderTimer();
}

function renderTimer() {
  const app = document.getElementById("app");

  const old = document.querySelector(".timer");
  if (old) old.remove();

  const div = document.createElement("div");
  div.className = "timer";

  div.innerHTML = `
    <b>⏱ Таймер</b>
    <div class="row">
      <input id="t" value="60">
      <button onclick="start()">Старт</button>
      <button onclick="stop()">Стоп</button>
    </div>

    <div class="timer-buttons">
      <button class="timer-btn plus" onclick="add30()">+30</button>
    </div>

    <div id="display">готов</div>

    <div class="switch-container">
      <span>🔔 уведомления</span>
      <label>
        <input type="checkbox" onchange="toggleNotif(this)">
        <span class="slider"></span>
      </label>
    </div>
  `;

  app.appendChild(div);
}

function start() {
  primeAudio();
  askNotif();

  let sec = parseInt(document.getElementById("t").value) || 60;

  targetTimestamp = Date.now() + sec * 1000;
  isRunning = true;

  clearInterval(timer);

  timer = setInterval(() => {
    if (!isRunning) return;

    let left = Math.ceil((targetTimestamp - Date.now()) / 1000);

    if (left <= 0) {
      stop(true);
      return;
    }

    document.getElementById("display").innerText = left + " сек";
  }, 250);
}

function stop(finished=false) {
  clearInterval(timer);
  isRunning = false;

  if (finished) {
    playSound();
    notify();
    document.getElementById("display").innerText = "готово";
  } else {
    document.getElementById("display").innerText = "стоп";
  }
}

function add30() {
  if (!targetTimestamp) return;
  targetTimestamp += 30000;
}

function toggleNotif(el) {
  notificationsEnabled = el.checked;
  localStorage.setItem("notif", notificationsEnabled);
}

function saveWorkout() {
  alert("Сохранено 💪");
}

selectDay("push");
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
