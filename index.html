<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #0f0f0f;
  color: #fff;
  overflow-x: hidden;
}

input, button, .tab, .save {
  font-size: 16px;
}

input[type="tel"] {
  width: 70px;
  padding: 5px;
  border-radius: 6px;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: #151515;
}

.tabs {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #1a1a1a;
}

.tab {
  padding: 8px 14px;
  border-radius: 20px;
  background: #2a2a2a;
  cursor: pointer;
}

.tab.active { background: #4caf50; }

.card {
  background: #1b1b1b;
  margin: 10px;
  padding: 12px;
  border-radius: 12px;
  transition: background 0.3s ease;
}

.card.completed {
  background: #2a5a2a;
  border: 1px solid #4caf50;
}

.title { font-weight: bold; }
.small { color: #aaa; font-size: 12px; }

.card.completed .small { color: #ccc; }

.row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin: 6px 0;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.save {
  width: calc(100% - 20px);
  margin: 10px;
  background: #4caf50;
  color: white;
}

.timer {
  margin: 10px;
  padding: 12px;
  background: #1b1b1b;
  border-radius: 12px;
}

.timer-buttons {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}

.timer-btn {
  flex: 1;
  background: #2a2a2a;
  color: white;
  padding: 8px;
}

.timer-btn.plus {
  background: #2196f3;
}

.notify-btn {
  margin-top: 8px;
  background: #ff9800;
  font-size: 12px;
}
</style>
</head>

<body>

<header>🏋️ Workout Tracker</header>

<div class="tabs">
  <div class="tab active" onclick="selectDay('push', this)">Толкай</div>
  <div class="tab" onclick="selectDay('pull', this)">Тяни</div>
  <div class="tab" onclick="selectDay('legs', this)">Ноги</div>
</div>

<div id="app"></div>

<button class="save" onclick="saveWorkout()">💾 Сохранить</button>

<script>

const program = {
  push: [
    {name:"Жим гантелей", reps:"8-12"},
    {name:"Разводка", reps:"12-15"},
    {name:"Жим над головой", reps:"10-15"},
    {name:"Вращение блина", reps:"10-12"},
    {name:"Французский жим", reps:"12-15"}
  ],
  pull: [
    {name:"Тяга гантели", reps:"10-15"},
    {name:"Доброе утро", reps:"12-15"},
    {name:"Пуловер", reps:"12-15"},
    {name:"Бицепс", reps:"12-15"},
    {name:"Диагональные подъёмы", reps:"12-15"}
  ],
  legs: [
    {name:"Присед", reps:"10-15"},
    {name:"Румынская тяга", reps:"12-15"},
    {name:"Выпады", reps:"10-12"},
    {name:"Махи гирей", reps:"15-20"},
    {name:"Джеб", reps:"12-15"}
  ]
};

let currentDay = "push";
let audioCtx = null;
let notificationPermissionAsked = false;

// Разблокировка аудио
function primeAudio(){
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!audioCtx) {
      audioCtx = new AudioContext();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  } catch(e){}
}

// Звук (только когда экран активен)
function playThreeBeeps(){
  if (!audioCtx) return;
  if (document.hidden) return; // Не играем звук, если страница не активна

  function beep(volume, delay){
    setTimeout(() => {
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      oscillator.type = "triangle";
      oscillator.frequency.value = 880;
      gain.gain.value = volume;
      oscillator.connect(gain);
      gain.connect(audioCtx.destination);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.15);
    }, delay);
  }

  beep(0.2, 0);
  beep(0.5, 400);
  beep(1.0, 800);
}

// Запрос разрешения на уведомления
function askNotificationPermission() {
  if (!("Notification" in window)) {
    console.log("Браузер не поддерживает уведомления");
    return;
  }
  
  if (Notification.permission === "granted") {
    console.log("Уведомления уже разрешены");
  } else if (Notification.permission !== "denied") {
    Notification.requestPermission().then(permission => {
      if (permission === "granted") {
        console.log("Уведомления разрешены");
      }
    });
  }
}

// Показать уведомление
function showNotification() {
  if (!("Notification" in window)) return;
  
  if (Notification.permission === "granted") {
    navigator.serviceWorker.ready.then(registration => {
      registration.showNotification("⏰ Workout Tracker", {
        body: "Отдых окончен! Пора делать следующий подход 💪",
        icon: "icon.png",
        badge: "icon.png",
        vibrate: [200, 100, 200],
        silent: false,
        tag: "timer-end",
        renotify: true
      });
    }).catch(() => {
      // Fallback, если Service Worker не готов
      new Notification("⏰ Workout Tracker", {
        body: "Отдых окончен! Пора делать следующий подход 💪",
        icon: "icon.png"
      });
    });
  }
}

function getData(){
  return JSON.parse(localStorage.getItem("workouts") || "[]");
}

function getLast(day, name){
  const all = getData().filter(w => w.day === day).reverse();
  for(let w of all){
    const ex = w.exercises.find(e => e.name === name);
    if(ex) return ex;
  }
  return null;
}

function checkAllCheckboxes(card) {
  const checkboxes = card.querySelectorAll("input[type=checkbox]");
  const allChecked = Array.from(checkboxes).every(cb => cb.checked);
  
  if (allChecked) {
    card.classList.add("completed");
  } else {
    card.classList.remove("completed");
  }
}

function selectDay(day, el){
  currentDay = day;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if(el) el.classList.add("active");

  const app = document.getElementById("app");
  app.innerHTML = "";

  program[day].forEach((ex, index) => {
    const last = getLast(day, ex.name);
    let prev = last
      ? `${last.weight || "-"} кг × ${last.sets.filter(s => s.done).length}`
      : "нет данных";

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.name = ex.name;

    card.innerHTML = `
      <div class="title">${index + 1}. ${ex.name} (${ex.reps})</div>
      <div class="small">⏮ ${prev}</div>

      <div class="row">
        <span>Вес:</span>
        <input type="tel" inputmode="numeric" pattern="\\d*" class="weight" value="${last?.weight || ''}">
      </div>

      <div class="row">
        <label><input type="checkbox" class="set-checkbox">1</label>
        <label><input type="checkbox" class="set-checkbox">2</label>
        <label><input type="checkbox" class="set-checkbox">3</label>
      </div>
    `;

    app.appendChild(card);
    
    const checkboxes = card.querySelectorAll(".set-checkbox");
    checkboxes.forEach(cb => {
      cb.addEventListener('change', () => checkAllCheckboxes(card));
    });
  });

  renderTimer();
}

function saveWorkout(){
  const cards = document.querySelectorAll(".card");
  const exercises = [];

  cards.forEach(c=>{
    const name = c.dataset.name;
    const weight = c.querySelector(".weight").value;
    const sets = [];
    c.querySelectorAll("input[type=checkbox]").forEach(cb=>{
      sets.push({done:cb.checked});
    });

    if(weight || sets.some(s=>s.done)){
      exercises.push({name, weight, sets});
    }
  });

  const data = getData();
  data.push({
    id:Date.now(),
    date:new Date().toISOString(),
    day:currentDay,
    exercises
  });

  localStorage.setItem("workouts", JSON.stringify(data));
  alert("Сохранено 💪");
  selectDay(currentDay, document.querySelector(".tab.active"));
}

// Таймер
let timer;
let timeLeft = 60;
let isTimerActive = false;
let targetTimestamp = null;
let backgroundInterval = null;

function updateTimerDisplay() {
  const d = document.getElementById("d");
  if (d) {
    d.innerText = `⏳ ${timeLeft} сек`;
  }
}

function onTimerEnd() {
  clearInterval(timer);
  clearInterval(backgroundInterval);
  isTimerActive = false;
  targetTimestamp = null;
  
  const d = document.getElementById("d");
  if (d) d.innerText = "⏰ отдых окончен!";
  
  // Пытаемся показать уведомление (сработает даже на заблокированном экране)
  showNotification();
  
  // Звук (только если страница активна)
  if (!document.hidden) {
    playThreeBeeps();
    navigator.vibrate?.([200,100,200]);
  }
}

function backgroundCheck() {
  if (!targetTimestamp || !isTimerActive) return;
  
  const now = Date.now();
  const remaining = Math.max(0, Math.ceil((targetTimestamp - now) / 1000));
  
  if (remaining <= 0) {
    onTimerEnd();
  } else {
    timeLeft = remaining;
    updateTimerDisplay();
  }
}

function start(){
  primeAudio();
  
  // Запрашиваем разрешение на уведомления при первом запуске таймера
  if (!notificationPermissionAsked) {
    notificationPermissionAsked = true;
    askNotificationPermission();
  }
  
  const val = parseInt(document.getElementById("t").value);
  timeLeft = isNaN(val) ? 60 : val;
  targetTimestamp = Date.now() + (timeLeft * 1000);
  
  const d = document.getElementById("d");
  clearInterval(timer);
  
  if (backgroundInterval) {
    clearInterval(backgroundInterval);
    backgroundInterval = null;
  }
  
  isTimerActive = true;
  
  // Основной таймер
  timer = setInterval(() => {
    if (!targetTimestamp || !isTimerActive) return;
    
    const now = Date.now();
    const remaining = Math.max(0, Math.ceil((targetTimestamp - now) / 1000));
    
    if (remaining <= 0) {
      onTimerEnd();
      return;
    }
    
    timeLeft = remaining;
    d.innerText = `⏳ ${timeLeft} сек`;
  }, 200);
  
  // Фоновый таймер
  backgroundInterval = setInterval(backgroundCheck, 1000);
}

function stop(){
  clearInterval(timer);
  if (backgroundInterval) {
    clearInterval(backgroundInterval);
    backgroundInterval = null;
  }
  isTimerActive = false;
  targetTimestamp = null;
  const d = document.getElementById("d");
  if (d) d.innerText = "остановлен";
}

function add30Seconds() {
  if (isTimerActive && targetTimestamp) {
    targetTimestamp += 30000;
    timeLeft = Math.max(0, Math.ceil((targetTimestamp - Date.now()) / 1000));
    updateTimerDisplay();
  } else if (!isTimerActive) {
    const input = document.getElementById("t");
    let currentVal = parseInt(input.value);
    if (isNaN(currentVal)) currentVal = 60;
    currentVal += 30;
    input.value = currentVal;
    timeLeft = currentVal;
    updateTimerDisplay();
  }
}

function renderTimer(){
  const app = document.getElementById("app");
  
  const oldTimer = document.querySelector(".timer");
  if (oldTimer) oldTimer.remove();
  
  const div = document.createElement("div");
  div.className = "timer";

  div.innerHTML = `
    <b>⏱ Таймер отдыха</b>
    <div class="row">
      <input id="t" type="tel" inputmode="numeric" pattern="\\d*" value="60">
      <button onclick="start()">Старт</button>
      <button onclick="stop()">Стоп</button>
    </div>
    <div class="timer-buttons">
      <button class="timer-btn plus" onclick="add30Seconds()">+30 сек</button>
    </div>
    <div id="d">не запущен</div>
    <button class="timer-btn notify-btn" onclick="askNotificationPermission()">🔔 Включить уведомления</button>
  `;

  app.appendChild(div);
}

// Слушаем, когда страница становится активной
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && targetTimestamp && isTimerActive) {
    // При возвращении на страницу обновляем отображение
    backgroundCheck();
  }
});

selectDay("push");

</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg => {
    console.log("Service Worker зарегистрирован");
  });
}
</script>

</body>
</html>
