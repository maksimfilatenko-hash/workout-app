<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #0f0f0f;
  color: #fff;
  overflow-x: hidden;
}

input, button, .tab, .save {
  font-size: 16px;
}

input[type="tel"] {
  width: 70px;
  padding: 5px;
  border-radius: 6px;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: #151515;
}

.tabs {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #1a1a1a;
}

.tab {
  padding: 8px 14px;
  border-radius: 20px;
  background: #2a2a2a;
  cursor: pointer;
}

.tab.active { background: #4caf50; }

.card {
  background: #1b1b1b;
  margin: 10px;
  padding: 12px;
  border-radius: 12px;
}

.title { font-weight: bold; }
.small { color: #aaa; font-size: 12px; }

.row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin: 6px 0;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.save {
  width: calc(100% - 20px);
  margin: 10px;
  background: #4caf50;
  color: white;
}

.timer {
  margin: 10px;
  padding: 12px;
  background: #1b1b1b;
  border-radius: 12px;
}
</style>
</head>

<body>

<header>🏋️ Workout Tracker</header>

<div class="tabs">
  <div class="tab active" onclick="selectDay('push', this)">Толкай</div>
  <div class="tab" onclick="selectDay('pull', this)">Тяни</div>
  <div class="tab" onclick="selectDay('legs', this)">Ноги</div>
</div>

<div id="app"></div>

<button class="save" onclick="saveWorkout()">💾 Сохранить</button>

<script>

const program = {
  push: [
    {name:"Жим гантелей", reps:"8-12"},
    {name:"Разводка", reps:"12-15"},
    {name:"Жим над головой", reps:"10-15"},
    {name:"Вращение блина", reps:"10-12"},
    {name:"Французский жим", reps:"12-15"}
  ],
  pull: [
    {name:"Тяга гантели", reps:"10-15"},
    {name:"Доброе утро", reps:"12-15"},
    {name:"Пуловер", reps:"12-15"},
    {name:"Бицепс", reps:"12-15"},
    {name:"Диагональные подъёмы", reps:"12-15"}
  ],
  legs: [
    {name:"Присед", reps:"10-15"},
    {name:"Румынская тяга", reps:"12-15"},
    {name:"Выпады", reps:"10-12"},
    {name:"Махи гирей", reps:"15-20"},
    {name:"Джеб", reps:"12-15"}
  ]
};

let currentDay = "push";
let audioCtx = null;

// 🔥 правильная разблокировка аудио (без звука)
function primeAudio(){
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;

    if (!audioCtx) {
      audioCtx = new AudioContext();
    }

    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  } catch(e){}
}

// 🔊 звук как Apple Watch
function playThreeBeeps(){
  if (!audioCtx) return;

  function beep(volume, delay){
    setTimeout(() => {

      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.type = "triangle";
      oscillator.frequency.value = 880;

      gain.gain.value = volume;

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.15);

    }, delay);
  }

  beep(0.2, 0);
  beep(0.5, 400);
  beep(1.0, 800);
}

function getData(){
  return JSON.parse(localStorage.getItem("workouts") || "[]");
}

function getLast(day, name){
  const all = getData().filter(w => w.day === day).reverse();
  for(let w of all){
    const ex = w.exercises.find(e => e.name === name);
    if(ex) return ex;
  }
  return null;
}

function selectDay(day, el){
  currentDay = day;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if(el) el.classList.add("active");

  const app = document.getElementById("app");
  app.innerHTML = "";

  program[day].forEach((ex, index) => {

    const last = getLast(day, ex.name);

    let prev = last
      ? `${last.weight || "-"} кг × ${last.sets.filter(s => s.done).length}`
      : "нет данных";

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.name = ex.name;

    card.innerHTML = `
      <div class="title">${index + 1}. ${ex.name} (${ex.reps})</div>
      <div class="small">⏮ ${prev}</div>

      <div class="row">
        <span>Вес:</span>
        <input type="tel" inputmode="numeric" pattern="\\d*" class="weight" value="${last?.weight || ''}">
      </div>

      <div class="row">
        <label><input type="checkbox">1</label>
        <label><input type="checkbox">2</label>
        <label><input type="checkbox">3</label>
      </div>
    `;

    app.appendChild(card);
  });

  renderTimer();
}

function saveWorkout(){
  const cards = document.querySelectorAll(".card");
  const exercises = [];

  cards.forEach(c=>{
    const name = c.dataset.name;
    const weight = c.querySelector(".weight").value;

    const sets = [];
    c.querySelectorAll("input[type=checkbox]").forEach(cb=>{
      sets.push({done:cb.checked});
    });

    if(weight || sets.some(s=>s.done)){
      exercises.push({name, weight, sets});
    }
  });

  const data = getData();

  data.push({
    id:Date.now(),
    date:new Date().toISOString(),
    day:currentDay,
    exercises
  });

  localStorage.setItem("workouts", JSON.stringify(data));
  alert("Сохранено 💪");
}

// TIMER
let timer;
let timeLeft = 120;

function renderTimer(){
  const app = document.getElementById("app");

  const div = document.createElement("div");
  div.className = "timer";

  div.innerHTML = `
    <b>⏱ Таймер отдыха</b>
    <div class="row">
      <input id="t" type="tel" inputmode="numeric" pattern="\\d*" value="120">
      <button onclick="start()">Старт</button>
      <button onclick="stop()">Стоп</button>
    </div>
    <div id="d">не запущен</div>
  `;

  app.appendChild(div);
}

function start(){
  primeAudio();

  const val = parseInt(document.getElementById("t").value);
  timeLeft = isNaN(val) ? 120 : val;

  const d = document.getElementById("d");
  clearInterval(timer);

  timer = setInterval(()=>{
    d.innerText = `⏳ ${timeLeft} сек`;

    if(timeLeft <= 0){
      clearInterval(timer);
      d.innerText = "⏰ отдых окончен!";
      playThreeBeeps();

      navigator.vibrate?.([200,100,200]);

      return;
    }

    timeLeft--;
  },1000);
}

function stop(){
  clearInterval(timer);
  document.getElementById("d").innerText = "остановлен";
}

selectDay("push");

</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
