<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:linear-gradient(180deg,#111214,#17181c);
  color:#fff;
  padding-bottom:100px;
}

/* ===== HEADER (если оставишь) ===== */
header{
  padding:12px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  color:#fff;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

/* ===== SEGMENTED CONTROL (tabs) ===== */
.tabs{
  display:flex;
  margin:12px 10px;
  padding:4px;
  background:rgba(255,255,255,0.06);
  border-radius:14px;
  gap:4px;

  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}

.tab{
  flex:1;
  text-align:center;
  padding:10px 0;
  border-radius:10px;
  cursor:pointer;
  color:#cfcfcf;
  font-weight:500;
  transition:0.2s;
}

.tab.active{
  background:rgba(255,255,255,0.12);
  color:#fff;
}

/* ===== CARD (glass iOS style) ===== */
.card{
  margin:10px;
  padding:14px;
  border-radius:16px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);

  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.06);

  transition:0.25s;
}

.card.completed{
  background:rgba(52,199,89,0.10);
  border:1px solid rgba(52,199,89,0.35);
}

/* ===== TEXT ===== */
.title{
  font-size:16px;
  font-weight:600;
  margin-bottom:4px;
}

.small{
  font-size:13px;
  color:#9a9aa1;
  margin-bottom:10px;
}

/* ===== ROW ===== */
.row{
  display:flex;
  align-items:center;
  gap:8px;
}

/* ===== INPUT ===== */
.weight{
  width:70px;
  padding:10px;
  border:none;
  border-radius:10px;

  background:rgba(255,255,255,0.07);
  color:#fff;
  text-align:center;
  font-size:16px;

  outline:none;
}

/* ===== SETS ===== */
.sets{
  display:flex;
  gap:10px;
  margin-left:8px; /* мягкое приближение к инпуту */
}

.sets label{
  display:flex;
  align-items:center;
  gap:4px;
  font-size:15px;
  color:#ddd;
}

.sets input{
  width:22px;
  height:22px;
  accent-color:#34c759;
}

/* ===== SAVE BUTTON (glass iOS) ===== */
.save{
  position:fixed;
  left:12px;
  right:12px;
  bottom:14px;

  padding:16px;
  border:none;
  border-radius:16px;

  background:rgba(255,255,255,0.85);
  color:#111;

  font-size:18px;
  font-weight:600;

  box-shadow:0 10px 25px rgba(0,0,0,0.25);

  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);

  cursor:pointer;
  z-index:100;
}

.save:active{
  transform:scale(0.98);
}</style>
</head>

<body>

<header>🏋️ Workout Tracker</header>

<div class="tabs">
  <div class="tab active" onclick="selectDay('push',this)">Толкай</div>
  <div class="tab" onclick="selectDay('pull',this)">Тяни</div>
  <div class="tab" onclick="selectDay('legs',this)">Ноги</div>
</div>

<div id="app"></div>

<button class="save" onclick="saveWorkout()">💾 Сохранить</button>

<script>
const program = {
  push: [
    {name:"Жим гантелей", reps:"8-12"},
    {name:"Разводка", reps:"12-15"},
    {name:"Жим над головой", reps:"10-15"},
    {name:"Вращение блина", reps:"10-12"},
    {name:"Французский жим", reps:"12-15"}
  ],
  pull: [
    {name:"Тяга гантели", reps:"10-15"},
    {name:"Доброе утро", reps:"12-15"},
    {name:"Пуловер", reps:"12-15"},
    {name:"Бицепс", reps:"12-15"},
    {name:"Диагональные подъёмы", reps:"12-15"}
  ],
  legs: [
    {name:"Присед", reps:"10-15"},
    {name:"Румынская тяга", reps:"12-15"},
    {name:"Выпады", reps:"10-12"},
    {name:"Махи гирей", reps:"15-20"},
    {name:"Джеб", reps:"12-15"}
  ]
};

let currentDay = "push";

function getData(){
  return JSON.parse(localStorage.getItem("workouts") || "[]");
}

function getLast(day,name){
  const all = getData().filter(w => w.day === day).reverse();
  for(let w of all){
    const ex = w.exercises.find(e => e.name === name);
    if(ex) return ex;
  }
  return null;
}

function selectDay(day,el){
  currentDay = day;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  const app = document.getElementById("app");
  app.innerHTML = "";

  program[day].forEach((ex,i)=>{
    const last = getLast(day, ex.name);
    const done = last?.sets ? last.sets.filter(s => s.done).length : 0;

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.name = ex.name;

    card.innerHTML = `
      <div class="title">${i+1}. ${ex.name} (${ex.reps})</div>
      <div class="small">⏮ ${last ? last.weight + " кг × " + done : "нет данных"}</div>

      <div class="row">
  <input type="tel" inputmode="numeric" class="weight" value="${last?.weight || ""}" placeholder="вес">

  <div class="sets">
    <label><input type="checkbox">1</label>
    <label><input type="checkbox">2</label>
    <label><input type="checkbox">3</label>
  </div>
</div>
    `;

    app.appendChild(card);

    const cbs = card.querySelectorAll("input[type=checkbox]");
    cbs.forEach(cb=>{
      cb.onchange = ()=>{
        const allChecked = [...cbs].every(x=>x.checked);
        card.classList.toggle("completed", allChecked);
      };
    });
  });
}

function saveWorkout(){
  const cards = document.querySelectorAll(".card");
  const exercises = [];

  cards.forEach(card=>{
    const name = card.dataset.name;
    const weight = card.querySelector(".weight").value;

    const sets = [...card.querySelectorAll("input[type=checkbox]")]
      .map(cb=>({done:cb.checked}));

    exercises.push({name, weight, sets});
  });

  const data = getData();
  data.push({
    id: Date.now(),
    date: new Date().toISOString(),
    day: currentDay,
    exercises
  });

  localStorage.setItem("workouts", JSON.stringify(data));

  alert("Тренировка сохранена 💪");
  selectDay(currentDay, document.querySelector(".tab.active"));
}

selectDay("push");
</script>

</body>
</html>
