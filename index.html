<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #0f0f0f;
  color: #fff;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: #151515;
}

.tabs {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #1a1a1a;
}

.tab {
  padding: 8px 14px;
  border-radius: 20px;
  background: #2a2a2a;
  cursor: pointer;
}

.tab.active { background: #4caf50; }

.card {
  background: #1b1b1b;
  margin: 10px;
  padding: 12px;
  border-radius: 12px;
  transition: 0.2s;
}

.card.completed {
  background: #2a5a2a;
  border: 1px solid #4caf50;
}

.title { font-weight: bold; }
.small { color: #aaa; font-size: 12px; }

.row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin: 6px 0;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.save {
  width: calc(100% - 20px);
  margin: 10px;
  background: #4caf50;
  color: white;
}

.timer {
  margin: 10px;
  padding: 12px;
  background: #1b1b1b;
  border-radius: 12px;
}

.timer-buttons {
  display: flex;
  gap: 10px;
}

.timer-btn.plus {
  background: #2196f3;
  color: white;
}

/* SWITCH */
.switch-container {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  padding-top: 8px;
  border-top: 1px solid #333;
}

.switch {
  position: relative;
  width: 48px;
  height: 24px;
}

.switch input {
  opacity: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #555;
  border-radius: 24px;
}

.slider:before {
  content: "";
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: #4caf50;
}

input:checked + .slider:before {
  transform: translateX(24px);
}
</style>
</head>

<body>

<header>🏋️ Workout Tracker</header>

<div class="tabs">
  <div class="tab active" onclick="selectDay('push', this)">Толкай</div>
  <div class="tab" onclick="selectDay('pull', this)">Тяни</div>
  <div class="tab" onclick="selectDay('legs', this)">Ноги</div>
</div>

<div id="app"></div>

<button class="save" onclick="saveWorkout()">💾 Сохранить</button>

<script>

const program = {
  push: [
    {name:"Жим гантелей", reps:"8-12"},
    {name:"Разводка", reps:"12-15"},
    {name:"Жим над головой", reps:"10-15"},
    {name:"Вращение блина", reps:"10-12"},
    {name:"Французский жим", reps:"12-15"}
  ],
  pull: [
    {name:"Тяга гантели", reps:"10-15"},
    {name:"Доброе утро", reps:"12-15"},
    {name:"Пуловер", reps:"12-15"},
    {name:"Бицепс", reps:"12-15"},
    {name:"Диагональные подъёмы", reps:"12-15"}
  ],
  legs: [
    {name:"Присед", reps:"10-15"},
    {name:"Румынская тяга", reps:"12-15"},
    {name:"Выпады", reps:"10-12"},
    {name:"Махи гирей", reps:"15-20"},
    {name:"Джеб", reps:"12-15"}
  ]
};

let currentDay = "push";
let audioCtx = null;
let notificationsEnabled = localStorage.getItem("notificationsEnabled") === "true" || false;

let timer;
let timeLeft = 60;
let isTimerActive = false;
let targetTimestamp = null;
let backgroundInterval = null;

// AUDIO FIX
function primeAudio(){
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  audioCtx.resume();
}

document.addEventListener("click", primeAudio, { once:true });

// SOUND
function beep(freq, delay, vol){
  setTimeout(()=>{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;
    gain.gain.value = vol;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
  }, delay);
}

function playSound(){
  if (document.hidden) return;
  beep(880,0,0.2);
  beep(880,300,0.4);
  beep(880,600,0.8);
}

// DATA
function getData(){
  return JSON.parse(localStorage.getItem("workouts") || "[]");
}

function getLast(day, name){
  const all = getData().filter(w => w.day === day).reverse();
  for(let w of all){
    const ex = w.exercises.find(e => e.name === name);
    if(ex) return ex;
  }
  return null;
}

// CHECK GREEN CARD
function checkAll(card){
  const cbs = card.querySelectorAll("input[type=checkbox]");
  const all = Array.from(cbs).every(c=>c.checked);
  card.classList.toggle("completed", all);
}

// SELECT DAY
function selectDay(day, el){
  currentDay = day;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  if(el) el.classList.add("active");

  const app = document.getElementById("app");
  app.innerHTML = "";

  program[day].forEach((ex, i)=>{

    const last = getLast(day, ex.name);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${i+1}. ${ex.name} (${ex.reps})</div>
      <div class="small">⏮ ${last ? (last.weight+" кг") : "нет данных"}</div>

      <div class="row">
        <span>Вес:</span>
        <input class="weight" value="${last?.weight || ""}">
      </div>

      <div class="row">
        <label><input type="checkbox" class="set">1</label>
        <label><input type="checkbox" class="set">2</label>
        <label><input type="checkbox" class="set">3</label>
      </div>
    `;

    app.appendChild(card);

    card.querySelectorAll(".set").forEach(cb=>{
      cb.addEventListener("change", ()=>checkAll(card));
    });
  });

  renderTimer();
}

// SAVE
function saveWorkout(){
  const cards = document.querySelectorAll(".card");
  const exercises = [];

  cards.forEach(c=>{
    const name = c.querySelector(".title").innerText;
    const weight = c.querySelector(".weight").value;

    const sets = [...c.querySelectorAll(".set")].map(s=>({done:s.checked}));

    exercises.push({name, weight, sets});
  });

  const data = getData();
  data.push({
    id:Date.now(),
    day:currentDay,
    date:new Date().toISOString(),
    exercises
  });

  localStorage.setItem("workouts", JSON.stringify(data));
  alert("Сохранено 💪");
}

// TIMER
function start(){
  primeAudio();

  let sec = parseInt(document.getElementById("t").value) || 60;
  timeLeft = sec;

  targetTimestamp = Date.now() + sec*1000;
  isTimerActive = true;

  clearInterval(timer);

  timer = setInterval(()=>{
    let left = Math.ceil((targetTimestamp - Date.now())/1000);

    if(left <= 0){
      stop(true);
      return;
    }

    timeLeft = left;
    document.getElementById("d").innerText = "⏳ " + left;
  }, 250);
}

function stop(finished=false){
  clearInterval(timer);
  isTimerActive = false;

  if(finished){
    playSound();
    document.getElementById("d").innerText = "готово";
  } else {
    document.getElementById("d").innerText = "стоп";
  }
}

function renderTimer(){
  const old = document.querySelector(".timer");
  if(old) old.remove();

  const div = document.createElement("div");
  div.className = "timer";

  div.innerHTML = `
    <b>⏱ Таймер</b>

    <div class="row">
      <input id="t" value="60">
      <button onclick="start()">Старт</button>
      <button onclick="stop()">Стоп</button>
    </div>

    <div id="d">не запущен</div>

    <div class="switch-container">
      <span>🔔 уведомления</span>
      <label class="switch">
        <input type="checkbox" onchange="toggleNotif(this)">
        <span class="slider"></span>
      </label>
    </div>
  `;

  document.getElementById("app").appendChild(div);
}

// NOTIF
function toggleNotif(el){
  notificationsEnabled = el.checked;
  localStorage.setItem("notificationsEnabled", notificationsEnabled);
}

selectDay("push");
</script>

</body>
</html>
