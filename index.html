<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
}

header{
  padding:15px;
  text-align:center;
  background:#151515;
  font-weight:bold;
}

.tabs{
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#1a1a1a;
}

.tab{
  padding:8px 14px;
  background:#2a2a2a;
  border-radius:20px;
  cursor:pointer;
}

.tab.active{background:#4caf50;}

.card{
  margin:10px;
  padding:12px;
  background:#1b1b1b;
  border-radius:12px;
}

.card.completed{
  background:#2a5a2a;
  border:1px solid #4caf50;
}

.title{font-weight:bold;}
.small{color:#aaa;font-size:12px;}

.row{
  display:flex;
  align-items:center;
  gap:8px;
  margin:6px 0;
}

.weight{
  width:55px;
  padding:4px;
  border-radius:6px;
  border:none;
  text-align:center;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.save{
  width:calc(100% - 20px);
  margin:10px;
  background:#4caf50;
  color:white;
}

/* TIMER */
.timer{
  margin:10px;
  padding:12px;
  background:#1b1b1b;
  border-radius:12px;
}

.timer-buttons{
  margin-top:8px;
}

.plus{
  background:#2196f3;
  color:white;
}
</style>
</head>

<body>

<header>🏋️ Workout Tracker</header>

<div class="tabs">
  <div class="tab active" onclick="selectDay('push',this)">Толкай</div>
  <div class="tab" onclick="selectDay('pull',this)">Тяни</div>
  <div class="tab" onclick="selectDay('legs',this)">Ноги</div>
</div>

<div id="app"></div>

<button class="save" onclick="saveWorkout()">💾 Сохранить</button>

<script>

const program={
  push:[
    {name:"Жим гантелей",reps:"8-12"},
    {name:"Разводка",reps:"12-15"},
    {name:"Жим над головой",reps:"10-15"},
    {name:"Французский жим",reps:"12-15"},
    {name:"Отжимания",reps:"макс"}
  ],
  pull:[
    {name:"Тяга гантели",reps:"10-15"},
    {name:"Бицепс",reps:"12-15"},
    {name:"Пуловер",reps:"12-15"},
    {name:"Доброе утро",reps:"12-15"},
    {name:"Подъёмы",reps:"12-15"}
  ],
  legs:[
    {name:"Присед",reps:"10-15"},
    {name:"Румынская тяга",reps:"12-15"},
    {name:"Выпады",reps:"10-12"},
    {name:"Махи",reps:"15-20"},
    {name:"Джамп",reps:"12-15"}
  ]
};

let day="push";

/* ================= STORAGE ================= */

function getData(){
  return JSON.parse(localStorage.getItem("workouts")||"[]");
}

function getLast(day,name){
  const all=getData().filter(w=>w.day===day).reverse();
  for(let w of all){
    const ex=w.exercises.find(e=>e.name===name);
    if(ex) return ex;
  }
  return null;
}

/* ================= UI ================= */

function selectDay(d,el){
  day=d;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  const app=document.getElementById("app");
  app.innerHTML="";

  program[d].forEach((ex,i)=>{

    const last=getLast(d,ex.name);

    let prev="нет данных";
    if(last){
      const done=last.sets?last.sets.filter(s=>s.done).length:0;
      prev=`${last.weight||0} кг × ${done}`;
    }

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="title">${i+1}. ${ex.name} (${ex.reps})</div>
      <div class="small">⏮ ${prev}</div>

      <div class="row">
        <input class="weight" placeholder="кг" value="${last?.weight||""}">
      </div>

      <div class="row">
        <label><input type="checkbox">1</label>
        <label><input type="checkbox">2</label>
        <label><input type="checkbox">3</label>
      </div>
    `;

    app.appendChild(card);

    card.querySelectorAll("input[type=checkbox]").forEach(cb=>{
      cb.onchange=()=>{
        const all=[...card.querySelectorAll("input[type=checkbox]")].every(c=>c.checked);
        card.classList.toggle("completed",all);
      };
    });
  });

  renderTimer();
}

/* ================= SAVE ================= */

function saveWorkout(){
  const cards=document.querySelectorAll(".card");
  const exercises=[];

  cards.forEach(c=>{
    const name=c.querySelector(".title").innerText;
    const weight=c.querySelector(".weight").value;

    const sets=[...c.querySelectorAll("input[type=checkbox]")]
      .map(s=>({done:s.checked}));

    exercises.push({name,weight,sets});
  });

  const data=getData();
  data.push({
    id:Date.now(),
    day,
    date:new Date().toISOString(),
    exercises
  });

  localStorage.setItem("workouts",JSON.stringify(data));

  alert("Сохранено 💪");
}

/* ================= TIMER ================= */

let timer;
let target=0;
let running=false;

function start(){
  let sec=parseInt(document.getElementById("t").value)||60;

  target=Date.now()+sec*1000;
  running=true;

  clearInterval(timer);

  timer=setInterval(()=>{
    let left=Math.ceil((target-Date.now())/1000);

    if(left<=0){
      stop(true);
      return;
    }

    document.getElementById("d").innerText="⏳ "+left;
  },200);
}

function stop(done=false){
  clearInterval(timer);
  running=false;

  document.getElementById("d").innerText=done?"готово":"стоп";
}

/* ✔ FIX +30 sec */
function add30(){
  if(running){
    target+=30000;
  }
}

/* ================= TIMER UI ================= */

function renderTimer(){
  const old=document.querySelector(".timer");
  if(old) old.remove();

  const div=document.createElement("div");
  div.className="timer";

  div.innerHTML=`
    <b>⏱ Таймер отдыха</b>

    <div class="row">
      <input id="t" value="60">
      <button onclick="start()">Старт</button>
      <button onclick="stop()">Стоп</button>
    </div>

    <div class="timer-buttons">
      <button class="plus" onclick="add30()">+30 сек</button>
    </div>

    <div id="d">не запущен</div>
  `;

  document.getElementById("app").appendChild(div);
}

/* INIT */
selectDay("push");

</script>

</body>
</html>
