<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>

<link rel="manifest" href="manifest.json">

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff;}
header{padding:15px;text-align:center;background:#151515;font-weight:bold;}

.tabs{display:flex;justify-content:space-around;padding:10px;background:#1a1a1a;}
.tab{padding:8px 14px;background:#2a2a2a;border-radius:20px;cursor:pointer;}
.tab.active{background:#4caf50;}

.card{margin:10px;padding:12px;background:#1b1b1b;border-radius:12px;}
.card.completed{background:#2a5a2a;border:1px solid #4caf50;}

.title{font-weight:bold;}
.small{color:#aaa;font-size:12px;}

.row{display:flex;gap:8px;align-items:center;margin:6px 0;}

.weight{
  width:70px;
  padding:5px;
  border-radius:6px;
  border:none;
  text-align:center;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.save{
  width:calc(100% - 20px);
  margin:10px;
  background:#4caf50;
  color:white;
}

.timer{
  margin:10px;
  padding:12px;
  background:#1b1b1b;
  border-radius:12px;
}

.timer-buttons{
  display:flex;
  gap:10px;
}

.plus{background:#2196f3;color:white;}
</style>
</head>

<body>

<header>🏋️ Workout Tracker</header>

<div class="tabs">
  <div class="tab active" onclick="selectDay('push',this)">Толкай</div>
  <div class="tab" onclick="selectDay('pull',this)">Тяни</div>
  <div class="tab" onclick="selectDay('legs',this)">Ноги</div>
</div>

<div id="app"></div>

<button class="save" onclick="saveWorkout()">💾 Сохранить</button>

<script>

/* ================= PROGRAM ================= */

const program = {
  push: [
    {name:"Жим гантелей",reps:"8-12"},
    {name:"Разводка",reps:"12-15"},
    {name:"Жим над головой",reps:"10-15"},
    {name:"Вращение блина",reps:"10-12"},
    {name:"Французский жим",reps:"12-15"}
  ],
  pull: [
    {name:"Тяга гантели",reps:"10-15"},
    {name:"Доброе утро",reps:"12-15"},
    {name:"Пуловер",reps:"12-15"},
    {name:"Бицепс",reps:"12-15"},
    {name:"Диагональные подъёмы",reps:"12-15"}
  ],
  legs: [
    {name:"Присед",reps:"10-15"},
    {name:"Румынская тяга",reps:"12-15"},
    {name:"Выпады",reps:"10-12"},
    {name:"Махи гирей",reps:"15-20"},
    {name:"Джеб",reps:"12-15"}
  ]
};

let currentDay="push";

/* ================= STORAGE ================= */

function getData(){
  return JSON.parse(localStorage.getItem("workouts")||"[]");
}

function getLast(day,name){
  const all=getData().filter(w=>w.day===day).reverse();
  for(let w of all){
    const ex=w.exercises.find(e=>e.name===name);
    if(ex) return ex;
  }
  return null;
}

/* ================= AUDIO ================= */

let audioCtx;

function primeAudio(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }
  audioCtx.resume();
}

function beep(f,d,v){
  setTimeout(()=>{
    if(!audioCtx){
      audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    }

    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();

    o.frequency.value=f;
    g.gain.value=v;

    o.connect(g);
    g.connect(audioCtx.destination);

    o.start();
    o.stop(audioCtx.currentTime+0.12);

  },d);
}

function playSound(){
  beep(800,0,0.2);
  beep(900,300,0.5);
  beep(1000,600,1);
}

/* ================= NOTIFY ================= */

let notificationsEnabled = localStorage.getItem("notificationsEnabled")!=="false";

function notify(){

  if(!document.hidden){
    playSound();
    navigator.vibrate?.([200,100,200]);
    return;
  }

  if(!notificationsEnabled) return;

  if("Notification" in window && Notification.permission==="granted"){
    navigator.serviceWorker?.ready.then(reg=>{
      reg.showNotification("Отдых окончен 💪",{
        body:"Пора делать следующий подход!",
        icon:"icon.png",
        tag:"timer"
      });
    });
  }
}

function askNotificationPermission(){
  if(Notification.permission==="default"){
    Notification.requestPermission();
  }
}

document.addEventListener("click",()=>{
  primeAudio();
  askNotificationPermission();
},{once:true});

/* ================= TIMER (SMART) ================= */

let timer;
let target=null;
let running=false;

function start(){

  const sec=parseInt(document.getElementById("t").value)||60;

  target=Date.now()+sec*1000;
  localStorage.setItem("timerEnd",target);

  running=true;

  clearInterval(timer);
  timer=setInterval(tick,250);

  tick();
}

function tick(){

  const end=parseInt(localStorage.getItem("timerEnd"));
  if(!end) return;

  const left=Math.ceil((end-Date.now())/1000);

  if(left<=0){
    finish();
    return;
  }

  document.getElementById("d").innerText="⏳ "+left;
}

function finish(){

  stop(false);
  localStorage.removeItem("timerEnd");

  notify();

  document.getElementById("d").innerText="готово";
}

function stop(clear=true){
  clearInterval(timer);
  running=false;

  if(clear) localStorage.removeItem("timerEnd");
}

function add30(){

  const input=document.getElementById("t");

  if(running){
    const end=parseInt(localStorage.getItem("timerEnd"))+30000;
    localStorage.setItem("timerEnd",end);
    tick();
  } else {
    input.value=(parseInt(input.value)||60)+30;
  }
}

function resumeCheck(){

  const end=parseInt(localStorage.getItem("timerEnd"));
  if(!end) return;

  if(Date.now()>=end){
    finish();
  } else {
    running=true;
    clearInterval(timer);
    timer=setInterval(tick,250);
  }
}

document.addEventListener("visibilitychange",()=>{
  if(!document.hidden){
    resumeCheck();
  }
});

/* ================= UI ================= */

function selectDay(day,el){

  currentDay=day;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  const app=document.getElementById("app");
  app.innerHTML="";

  program[day].forEach((ex,i)=>{

    const last=getLast(day,ex.name);
    const done=last?.sets?last.sets.filter(s=>s.done).length:0;

    const card=document.createElement("div");
    card.className="card";
    card.dataset.name=ex.name;

    card.innerHTML=`
      <div class="title">${i+1}. ${ex.name} (${ex.reps})</div>
      <div class="small">⏮ ${last?last.weight+" × "+done:"нет данных"}</div>

      <div class="row">
        <input type="tel" inputmode="numeric" class="weight" value="${last?.weight||""}">
      </div>

      <div class="row">
        <label><input type="checkbox">1</label>
        <label><input type="checkbox">2</label>
        <label><input type="checkbox">3</label>
      </div>
    `;

    app.appendChild(card);

    const cbs=card.querySelectorAll("input[type=checkbox]");
    cbs.forEach(cb=>{
      cb.onchange=()=>{
        const all=[...cbs].every(c=>c.checked);
        card.classList.toggle("completed",all);
      };
    });

  });

  renderTimer();
}

/* ================= SAVE ================= */

function saveWorkout(){

  const cards=document.querySelectorAll(".card");
  const exercises=[];

  cards.forEach(c=>{

    const name=c.dataset.name;
    const weight=c.querySelector(".weight").value;

    const sets=[...c.querySelectorAll("input[type=checkbox]")]
      .map(cb=>({done:cb.checked}));

    exercises.push({name,weight,sets});
  });

  const data=getData();
  data.push({
    id:Date.now(),
    date:new Date().toISOString(),
    day:currentDay,
    exercises
  });

  localStorage.setItem("workouts",JSON.stringify(data));

  alert("Сохранено 💪");
}

/* ================= TIMER UI ================= */

function renderTimer(){

  const old=document.querySelector(".timer");
  if(old) old.remove();

  const div=document.createElement("div");
  div.className="timer";

  div.innerHTML=`
    <b>⏱ Таймер отдыха</b>

    <div class="row">
      <input id="t" type="tel" inputmode="numeric" value="60">
      <button onclick="start()">Старт</button>
      <button onclick="stop()">Стоп</button>
    </div>

    <div class="timer-buttons">
      <button class="plus" onclick="add30()">+30 сек</button>
    </div>

    <div id="d">не запущен</div>

    <div class="row">
      <span>🔔 уведомления</span>
      <input type="checkbox" id="notif">
    </div>
  `;

  document.getElementById("app").appendChild(div);

  const sw=document.getElementById("notif");
  sw.checked=notificationsEnabled;

  sw.onchange=()=>{
    notificationsEnabled=sw.checked;
    localStorage.setItem("notificationsEnabled",notificationsEnabled);

    if(notificationsEnabled){
      askNotificationPermission();
    }
  };
}

/* INIT */

selectDay("push");
resumeCheck();

</script>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
